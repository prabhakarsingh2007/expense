{% extends 'expenses/base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4>Edit Expense</h4>
            </div>

            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <!-- Amount -->
                    <div class="mb-3">
                        <label class="form-label">Amount</label>
                        <input type="number" step="0.01" name="amount"
                               value="{{ expense.amount }}"
                               class="form-control" required>
                    </div>

                    <!-- Category FIXED -->
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-control" required>
                            {% for cat in categories %}
                                <option value="{{ cat.id }}"
                                    {% if expense.category.id == cat.id %}selected{% endif %}>
                                    {{ cat.icon }} {{ cat.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Date -->
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" name="date"
                               class="form-control"
                               value="{{ expense.date|date:'Y-m-d' }}"
                               min="{{ min_date|date:'Y-m-d' }}"
                               max="{{ max_date|date:'Y-m-d' }}" required>
                        <small class="text-muted">Allowed range: {{ min_date|date:'d-m-Y' }} to {{ max_date|date:'d-m-Y' }}</small>
                    </div>

                    <!-- Note -->
                    <div class="mb-3">
                        <label class="form-label">Note (Optional)</label>
                        <textarea name="note" class="form-control" rows="3">
{{ expense.note }}</textarea>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-primary w-100">
                        Update Expense
                    </button>

                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
