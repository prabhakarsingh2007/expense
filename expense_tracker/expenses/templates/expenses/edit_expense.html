{% extends 'expenses/base.html' %}
{% load static %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-10 px-4">
    <div class="max-w-xl w-full">
        
        <div class="flex items-center justify-between mb-6 px-2">
            <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">Edit Transaction</h2>
            <a href="{% url 'dashboard' %}" class="text-slate-400 hover:text-slate-600 transition-colors">
                <i class="fas fa-times-circle text-2xl"></i>
            </a>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200 border border-slate-100 overflow-hidden">
            <div class="bg-amber-50 px-8 py-4 border-b border-amber-100 flex items-center gap-3">
                <div class="w-8 h-8 bg-amber-100 rounded-lg flex items-center justify-center text-amber-600 shadow-sm">
                    <i class="fas fa-pen-fancy text-xs"></i>
                </div>
                <p class="text-[11px] font-bold text-amber-700 uppercase tracking-wider">Modifying existing record</p>
            </div>

            <div class="p-8 sm:p-10">
                <form method="post" class="space-y-6">
                    {% csrf_token %}

                    <div class="bg-slate-50 rounded-3xl p-6 border border-slate-100 group focus-within:border-amber-400 transition-all">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 ml-1">Update Amount</label>
                        <div class="relative flex items-center">
                            <span class="text-3xl font-bold text-slate-400 mr-2">₹</span>
                            <input type="number" step="0.01" name="amount" value="{{ expense.amount }}" 
                                   class="w-full text-4xl font-black text-slate-800 bg-transparent border-none outline-none focus:ring-0" 
                                   placeholder="0.00" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase ml-1">Category</label>
                            <div class="relative">
                                <select name="category" class="w-full pl-4 pr-10 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 font-semibold appearance-none focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer" required>
                                    {% for cat in categories %}
                                        <option value="{{ cat.id }}" {% if expense.category.id == cat.id %}selected{% endif %}>
                                            {{ cat.icon }} {{ cat.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                                <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                    <i class="fas fa-angle-down"></i>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase ml-1">Transaction Date</label>
                            <input type="date" name="date" value="{{ expense.date|date:'Y-m-d' }}" 
                                   min="{{ min_date|date:'Y-m-d' }}" max="{{ max_date|date:'Y-m-d' }}"
                                   class="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 font-semibold focus:ring-2 focus:ring-amber-500 outline-none transition-all" required>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase ml-1">Payment Type</label>
                        <select name="payment_type" class="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 font-semibold focus:ring-2 focus:ring-amber-500 outline-none transition-all" required>
                            {% for value, label in payment_type_choices %}
                                <option value="{{ value }}" {% if expense.payment_type == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase ml-1">Description</label>
                        <textarea name="description" rows="3" 
                                  class="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 font-medium focus:ring-2 focus:ring-amber-500 outline-none transition-all resize-none" 
                                  placeholder="Why did you spend this?" required>{{ expense.description|default:expense.note }}</textarea>
                    </div>

                    <div class="pt-4 space-y-3">
                        <button type="submit" class="w-full bg-slate-900 text-white text-sm font-black uppercase tracking-[0.2em] py-5 rounded-2xl shadow-xl hover:bg-slate-800 transform active:scale-[0.98] transition-all">
                            Save Changes
                        </button>
                        
                        <a href="{% url 'dashboard' %}" class="block w-full text-center py-4 text-xs font-bold text-slate-400 hover:text-rose-500 transition-colors uppercase tracking-widest">
                            Discard Changes
                        </a>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="mt-8 flex justify-center">
            <div class="bg-indigo-50 px-4 py-2 rounded-full border border-indigo-100 flex items-center gap-2">
                <span class="text-[10px] font-bold text-indigo-600 uppercase tracking-tighter">Pro Tip:</span>
                <span class="text-[10px] font-medium text-indigo-400 italic">Editing older records might affect your monthly reports!</span>
            </div>
        </div>

    </div>
</div>
{% endblock %}
