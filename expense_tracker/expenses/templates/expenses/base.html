{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocket | Expense Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        .glass-effect { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>

<body class="bg-[#f8fafc] text-slate-900">

    <header class="hidden lg:block glass-effect sticky top-0 z-50 border-b border-slate-100 px-8 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="{% url 'dashboard' %}" class="text-2xl font-black text-indigo-600 tracking-tighter italic no-underline">Pocket.</a>
            
            <nav class="flex items-center gap-2">
                <a href="{% url 'dashboard' %}" class="px-4 py-2 text-sm font-bold text-slate-600 hover:bg-slate-50 rounded-xl no-underline">Dashboard</a>
                <a href="{% url 'search' %}" class="px-4 py-2 text-sm font-bold text-slate-600 hover:bg-slate-50 rounded-xl no-underline">History</a>
                
                <a href="{% url 'export_csv' %}" class="px-4 py-2 text-sm font-bold text-emerald-600 hover:bg-emerald-50 rounded-xl no-underline flex items-center gap-2">
                    <i class="fas fa-file-csv"></i> Export
                </a>

                <a href="{% url 'report' %}" class="px-4 py-2 text-sm font-bold text-slate-600 hover:bg-slate-50 rounded-xl no-underline">Analytics</a>
                <a href="{% url 'about_me' %}" class="px-4 py-2 text-sm font-bold text-slate-600 hover:bg-slate-50 rounded-xl no-underline">About</a>
                <div class="h-6 w-[1px] bg-slate-200 mx-2"></div>
                <a href="{% url 'logout' %}" class="text-rose-500 font-bold text-sm no-underline">Logout</a>
            </nav>
        </div>
    </header>

    <header class="lg:hidden glass-effect sticky top-0 z-50 border-b border-slate-100 px-5 py-4 flex justify-between items-center">
        <span class="text-xl font-black text-indigo-600 italic">Pocket.</span>
        <div class="flex items-center gap-5">
            <a href="{% url 'export_csv' %}" class="text-emerald-500 no-underline flex items-center gap-1">
                <i class="fas fa-file-arrow-down text-xl"></i>
                <span class="text-[10px] font-bold">CSV</span>
            </a>
            <a href="{% url 'logout' %}" class="text-slate-400 text-lg"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 pb-32 lg:pb-10">
        {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                    <div class="p-4 rounded-2xl border text-xs font-bold shadow-sm {% if message.tags == 'error' %}bg-rose-50 border-rose-100 text-rose-700{% else %}bg-emerald-50 border-emerald-100 text-emerald-700{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <nav class="lg:hidden fixed bottom-0 left-0 right-0 glass-effect border-t border-slate-100 px-1 py-3 z-[100] pb-safe">
        <div class="flex justify-around items-end">
            <a href="{% url 'dashboard' %}" class="flex flex-col items-center gap-1 w-14 transition-all {% if request.resolver_match.url_name == 'dashboard' %}text-indigo-600{% else %}text-slate-400{% endif %} no-underline">
                <i class="fas fa-house-chimney text-xl"></i>
                <span class="text-[8px] font-black uppercase tracking-tighter">Home</span>
            </a>
            
            <a href="{% url 'search' %}" class="flex flex-col items-center gap-1 w-14 transition-all {% if request.resolver_match.url_name == 'search' %}text-indigo-600{% else %}text-slate-400{% endif %} no-underline">
                <i class="fas fa-receipt text-xl"></i>
                <span class="text-[8px] font-black uppercase tracking-tighter">History</span>
            </a>

            <a href="{% url 'add_expense' %}" class="relative -top-6">
                <div class="bg-slate-900 w-14 h-14 rounded-2xl shadow-xl shadow-indigo-200 flex items-center justify-center text-white text-xl border-[4px] border-[#f8fafc]">
                    <i class="fas fa-plus"></i>
                </div>
            </a>

            <a href="{% url 'report' %}" class="flex flex-col items-center gap-1 w-14 transition-all {% if request.resolver_match.url_name == 'report' %}text-indigo-600{% else %}text-slate-400{% endif %} no-underline">
                <i class="fas fa-chart-pie text-xl"></i>
                <span class="text-[8px] font-black uppercase tracking-tighter">Stats</span>
            </a>

            <a href="{% url 'about_me' %}" class="flex flex-col items-center gap-1 w-14 transition-all {% if request.resolver_match.url_name == 'about_me' %}text-indigo-600{% else %}text-slate-400{% endif %} no-underline">
                <i class="fas fa-circle-user text-xl"></i>
                <span class="text-[8px] font-black uppercase tracking-tighter">About</span>
            </a>
        </div>
    </nav>

    <style>
        .pb-safe { padding-bottom: calc(0.75rem + env(safe-area-inset-bottom)); }
        @media (max-width: 1024px) {
            body { padding-bottom: 60px; }
        }
    </style>

</body>
</html>
