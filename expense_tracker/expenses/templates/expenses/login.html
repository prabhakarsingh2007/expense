{% extends 'expenses/base.html' %}
{% load static %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        
        <div class="text-center">
            <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-2">
                Welcome Back
            </h2>
            <p class="text-slate-500 font-medium text-sm">
                Login to manage your expenses and savings
            </p>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-indigo-100 border border-slate-100 overflow-hidden relative">
            <div class="h-1.5 w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-indigo-500"></div>

            <div class="p-8 sm:p-10">
                <form method="post" class="space-y-6">
                    {% csrf_token %}

                    <div class="space-y-2">
                        <label for="id_username" class="block text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">
                            Username or Email
                        </label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                                <i class="fas fa-user-circle"></i>
                            </div>
                            <input type="text" name="username" id="id_username" required
                                   class="block w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 font-semibold focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all placeholder:text-slate-300"
                                   placeholder="Your unique ID">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between items-center px-1">
                            <label for="id_password" class="block text-xs font-bold text-slate-500 uppercase tracking-widest">
                                Password
                            </label>
                            </div>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                                <i class="fas fa-lock"></i>
                            </div>
                            <input type="password" name="password" id="id_password" required
                                   class="block w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 font-semibold focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all placeholder:text-slate-300"
                                   placeholder="••••••••">
                        </div>
                    </div>

                    <div class="pt-2">
                        <button type="submit" class="w-full bg-indigo-600 text-white text-sm font-black uppercase tracking-[0.2em] py-5 rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 hover:scale-[1.01] active:scale-[0.99] transition-all">
                            Secure Login
                        </button>
                    </div>
                </form>

                <div class="mt-10 text-center border-t border-slate-50 pt-8">
                    <p class="text-slate-500 text-sm font-medium">
                        Don't have an account? 
                        <a href="{% url 'signup' %}" class="text-indigo-600 font-extrabold hover:text-indigo-800 transition-colors ml-1">
                            Sign Up Now
                        </a>
                    </p>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-center gap-2 opacity-30 select-none">
            <span class="w-8 h-[1px] bg-slate-400"></span>
            <span class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-600">KharchaGraph</span>
            <span class="w-8 h-[1px] bg-slate-400"></span>
        </div>
    </div>
</div>

<style>
    @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    .bg-gradient-to-r {
        background-size: 200% 200%;
        animation: gradientShift 4s ease infinite;
    }
</style>
{% endblock %}
