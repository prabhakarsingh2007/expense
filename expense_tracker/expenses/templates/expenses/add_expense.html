{% extends 'expenses/base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header">
                <h4>Add New Expense</h4>
            </div>

            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <!-- Amount -->
                    <div class="mb-3">
                        <label class="form-label">Amount</label>
                        <input type="number" step="0.01" name="amount" value="{{ form_data.amount }}" class="form-control" required>
                    </div>

                    <!-- Category (FIXED ✅) -->
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-control" required>
                            {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if form_data.category == cat.id|stringformat:'s' %}selected{% endif %}>
                                    {{ cat.icon }} {{ cat.name }}
                                </option>
                            {% empty %}
                                <option disabled>No categories found</option>
                            {% endfor %}
                        </select>

                        <small>
                            <a href="{% url 'manage_categories' %}">
                                ➕ Manage Categories
                            </a>
                        </small>
                    </div>

                    <!-- Date -->
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" name="date" value="{{ form_data.date }}" min="{{ min_date|date:'Y-m-d' }}" max="{{ max_date|date:'Y-m-d' }}" class="form-control" required>
                        <small class="text-muted">Allowed range: {{ min_date|date:'d-m-Y' }} to {{ max_date|date:'d-m-Y' }}</small>
                    </div>

                    <!-- Note -->
                    <div class="mb-3">
                        <label class="form-label">Note (Optional)</label>
                        <textarea name="note" class="form-control" rows="3">{{ form_data.note }}</textarea>
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="isRecurring" name="is_recurring" {% if form_data.is_recurring %}checked{% endif %}>
                        <label class="form-check-label" for="isRecurring">
                            Make this a recurring expense
                        </label>
                    </div>

                    <div id="recurringFields" class="border rounded p-3 mb-3" style="display: none;">
                        <div class="mb-3">
                            <label class="form-label">Repeat</label>
                            <select name="frequency" class="form-control">
                                {% for value, label in frequency_choices %}
                                    <option value="{{ value }}" {% if form_data.frequency == value %}selected{% elif not form_data.frequency and value == 'monthly' %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-0">
                            <label class="form-label">End Date (Optional)</label>
                            <input type="date" name="recurring_end_date" value="{{ form_data.recurring_end_date }}" class="form-control">
                            <small class="text-muted">Leave blank to continue until you stop it.</small>
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-success w-100">
                        Add Expense
                    </button>

                </form>
            </div>
        </div>
    </div>
</div>

<script>
    (function () {
        const checkbox = document.getElementById('isRecurring');
        const fields = document.getElementById('recurringFields');

        function toggleRecurringFields() {
            fields.style.display = checkbox.checked ? 'block' : 'none';
        }

        checkbox.addEventListener('change', toggleRecurringFields);
        toggleRecurringFields();
    })();
</script>

{% endblock %}
