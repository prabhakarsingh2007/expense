{% extends 'expenses/base.html' %}
{% load static %}

{% block content %}
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<div class="min-h-screen bg-slate-50 py-10 px-4 sm:px-6">
    <div class="max-w-xl mx-auto">
        
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">Add Expense</h2>
            <a href="{% url 'dashboard' %}" class="text-slate-500 hover:text-indigo-600 transition-colors text-sm font-bold uppercase tracking-widest">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200 border border-slate-100 overflow-hidden">
            <div class="p-8 sm:p-10">
                <form method="post" class="space-y-6">
                    {% csrf_token %}

                    <div class="text-center mb-10">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3">Amount to Track</label>
                        <div class="relative inline-block w-full">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-3xl font-bold text-slate-300">₹</span>
                            <input type="number" step="0.01" name="amount" value="{{ form_data.amount }}" 
                                   class="w-full text-center text-5xl font-black text-indigo-600 bg-transparent border-b-2 border-slate-100 focus:border-indigo-500 outline-none py-4 transition-all" 
                                   placeholder="0.00" required autofocus>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <div class="flex items-center justify-between gap-2">
                                <label class="block text-xs font-bold text-slate-500 uppercase ml-1">Category</label>
                                <a href="{% url 'manage_categories' %}" class="inline-flex items-center gap-1 rounded-lg bg-indigo-100 px-2.5 py-1.5 text-[11px] font-extrabold uppercase tracking-wide text-indigo-700 no-underline hover:bg-indigo-200 transition-colors">
                                    <i class="fas fa-plus text-[10px]"></i>
                                    <span>Add Category</span>
                                </a>
                            </div>
                            <div class="relative">
                                <select name="category" class="w-full pl-4 pr-10 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 font-semibold appearance-none focus:ring-2 focus:ring-indigo-500 outline-none transition-all cursor-pointer" required>
                                    {% for cat in categories %}
                                        <option value="{{ cat.id }}" {% if form_data.category == cat.id|stringformat:'s' %}selected{% endif %}>
                                            {{ cat.icon }} {{ cat.name }}
                                        </option>
                                    {% empty %}
                                        <option disabled>No categories</option>
                                    {% endfor %}
                                </select>
                                <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                    <i class="fas fa-chevron-down text-xs"></i>
                                </div>
                            </div>
                            <p class="px-1 text-[11px] font-semibold text-slate-400">Category nahi mil rahi? Upar wala Add Category dabao.</p>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase ml-1">Date</label>
                            <input type="date" name="date" value="{{ form_data.date }}" 
                                   min="{{ min_date|date:'Y-m-d' }}" max="{{ max_date|date:'Y-m-d' }}"
                                   class="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 font-semibold focus:ring-2 focus:ring-indigo-500 outline-none transition-all" required>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase ml-1">Payment Type</label>
                        <select name="payment_type" class="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 font-semibold focus:ring-2 focus:ring-indigo-500 outline-none transition-all" required>
                            {% for value, label in payment_type_choices %}
                                <option value="{{ value }}" {% if form_data.payment_type == value %}selected{% elif not form_data.payment_type and value == 'cash' %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase ml-1">Description</label>
                        <textarea name="description" rows="2" 
                                  class="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 font-medium focus:ring-2 focus:ring-indigo-500 outline-none transition-all resize-none" 
                                  placeholder="Describe this expense..." required>{{ form_data.description }}</textarea>
                    </div>

                    <div class="bg-indigo-50/50 rounded-3xl p-5 border border-indigo-100 transition-all">
                        <label class="flex items-center justify-between cursor-pointer">
                            <span class="text-sm font-bold text-indigo-900">Recurring Expense</span>
                            <div class="relative">
                                <input type="checkbox" id="isRecurring" name="is_recurring" class="sr-only peer" {% if form_data.is_recurring %}checked{% endif %}>
                                <div class="w-12 h-6 bg-slate-300 rounded-full peer peer-focus:ring-4 peer-focus:ring-indigo-200 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                            </div>
                        </label>

                        <div id="recurringFields" class="mt-4 pt-4 border-t border-indigo-100 space-y-4" style="display: none;">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-1">Frequency</label>
                                    <select name="frequency" class="w-full px-3 py-2 bg-white border border-indigo-100 rounded-xl text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-400">
                                        {% for value, label in frequency_choices %}
                                            <option value="{{ value }}" {% if form_data.frequency == value %}selected{% elif not form_data.frequency and value == 'monthly' %}selected{% endif %}>{{ label }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-1">End Date</label>
                                    <input type="date" name="recurring_end_date" value="{{ form_data.recurring_end_date }}" 
                                           class="w-full px-3 py-2 bg-white border border-indigo-100 rounded-xl text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-400">
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 text-white text-sm font-black uppercase tracking-[0.15em] py-5 rounded-[1.5rem] shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:scale-[1.02] active:scale-[0.98] transition-all">
                        Save Transaction
                    </button>
                </form>
            </div>
        </div>
        
        <p class="text-center mt-8 text-slate-400 text-xs font-bold uppercase tracking-widest">
            KharchaGraph Dashboard • Smart Finance
        </p>
    </div>
</div>

<script>
    (function () {
        const checkbox = document.getElementById('isRecurring');
        const fields = document.getElementById('recurringFields');

        function toggleRecurringFields() {
            fields.style.display = checkbox.checked ? 'block' : 'none';
        }

        checkbox.addEventListener('change', toggleRecurringFields);
        toggleRecurringFields();
    })();
</script>
{% endblock %}
